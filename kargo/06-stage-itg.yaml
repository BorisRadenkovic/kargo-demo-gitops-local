apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: itg
  namespace: kargo-demo
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: demo-app
      sources:
        stages:
          - dev
  promotionTemplate:
    spec:
      steps:
        - task:
            name: demo-app-promo
          as: promo