apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app-itg
  namespace: argocd
  annotations:
    kargo.akuity.io/authorized-stage: kargo-demo:itg
spec:
  project: default
  source:
    repoURL: https://github.com/<tvoj-user>/kargo-demo-gitops.git
    targetRevision: main
    path: applications/demo-app
    helm:
      releaseName: demo-app-itg
      valueFiles:
        - values.yaml
        - values-itg.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-itg
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true